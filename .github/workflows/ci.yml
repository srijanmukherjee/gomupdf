name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build · vet · test · coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MuPDF (system package)
        run: |
          sudo apt-get update
          # libmupdf-dev provides the headers and the static libmupdf.a. Debian
          # unbundles MuPDF's third-party deps, so they are installed separately
          # and linked explicitly below (there is no libmupdf-third on Debian).
          sudo apt-get install -y --no-install-recommends \
            libmupdf-dev \
            libfreetype-dev libharfbuzz-dev libjbig2dec0-dev \
            libopenjp2-7-dev libjpeg-dev libgumbo-dev libmujs-dev zlib1g-dev
          echo "--- installed MuPDF artifacts ---"
          dpkg -L libmupdf-dev | grep -E '\.(a|so|pc|h)$' | head -n 20 || true

      - name: Configure cgo link flags
        run: |
          # The binding's in-source linux flags are `-lmupdf -lmupdf-third`, but
          # Debian ships no libmupdf-third. Provide an empty stub so that flag
          # resolves, then link MuPDF's third-party deps from the system.
          mkdir -p "$HOME/stublib"
          ar crs "$HOME/stublib/libmupdf-third.a"
          echo "LIBRARY_PATH=$HOME/stublib" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-lfreetype -lharfbuzz -ljbig2dec -lopenjp2 -ljpeg -lgumbo -lmujs -lz -lm" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false # no module dependencies, so nothing to cache

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Build without the MuPDF backend (build-tag seam)
        # The public API is backend-neutral; -tags nomupdf must compile with all
        # cgo excluded (constructors then return errNoBackend).
        run: go build -tags nomupdf ./...

      - name: Test with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary & gate
        run: |
          go tool cover -func=coverage.out | tail -1
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t+0 >= 80 ? 0 : 1) }' \
            || { echo "Coverage ${total}% is below the 80% gate"; exit 1; }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
